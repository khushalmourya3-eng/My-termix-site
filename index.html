
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin OS | Level 18 Singularity</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --primary: #00f3ff; --secondary: #ff00ea; --accent: #eaff00; --glass: rgba(10, 10, 25, 0.7); }
        body.theme-toxic { --primary: #00ff41; --secondary: #003b00; --accent: #adff2f; }
        body.theme-amber { --primary: #ffb100; --secondary: #5a2a00; --accent: #ff4500; }
        
        body { margin: 0; padding: 0; color: #fff; font-family: 'Courier New', monospace; background: #020205; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; min-height: 100vh; transition: background 0.5s; }
        
        #particles-js { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; pointer-events: none; }
        
        /* Kinetic Ripple Effect */
        .ripple { position: fixed; border-radius: 50%; background: rgba(255, 255, 255, 0.4); transform: scale(0); animation: ripple-effect 0.6s linear; pointer-events: none; z-index: 9999; }
        @keyframes ripple-effect { to { transform: scale(4); opacity: 0; } }

        /* Hacker Overload Glitch */
        .overload { animation: shake 0.1s infinite, chromatic 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -2px); } 100% { transform: translate(1px, 1px); } }
        @keyframes chromatic { 0% { text-shadow: 2px 0 red, -2px 0 blue; } 100% { text-shadow: -2px 0 red, 2px 0 blue; } }

        #hackerMode { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 20000; padding: 20px; color: var(--primary); font-size: 1rem; overflow: hidden; display: none; word-break: break-all; }

        .rainbow-text { background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent), var(--primary)); background-size: 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradientMove 3s linear infinite; font-weight: bold; letter-spacing: 2px; }
        @keyframes gradientMove { 0% {background-position: 0% 50%;} 100% {background-position: 100% 50%;} }

        .glass-panel { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 20px; margin-top: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); border-top: 1px solid rgba(255,255,255,0.2); transition: 0.3s; }
        .drag-handle { cursor: grab; padding-bottom: 12px; border-bottom: 1px dashed var(--glass-border); margin-bottom: 12px; font-size: 0.75rem; color: var(--primary); text-transform: uppercase; font-weight: 900; }

        .btn { background: transparent; color: var(--primary); border: 1px solid var(--primary); padding: 12px; cursor: pointer; border-radius: 8px; width: 100%; font-family: inherit; font-weight: bold; transition: 0.3s; position: relative; overflow: hidden; }
        .btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary); }

        .cli-box { border: 1px solid var(--primary); padding: 12px; background: #000; display: flex; align-items: center; border-radius: 10px; box-shadow: inset 0 0 10px var(--primary); width: 90%; max-width: 500px; margin-top: 20px; }
        #cliInput { background: transparent; border: none; color: #fff; flex-grow: 1; outline: none; font-family: inherit; font-size: 1rem; }
        
        .leaflet-tile { filter: invert(100%) hue-rotate(180deg) brightness(120%) contrast(120%); }
    </style>
</head>
<body id="osBody">
    <div id="hackerMode"></div>
    <div id="particles-js"></div>

    <div id="loginScreen">
        <div class="glass-panel" style="width: 280px; text-align: center;">
            <h2 class="rainbow-text">SYSTEM_LINK</h2>
            <input type="password" id="passInput" style="background:rgba(255,255,255,0.05); border:1px solid var(--primary); color:#fff; padding:12px; width:80%; text-align:center; border-radius:8px;" placeholder="KEY_ID">
            <button class="btn" style="margin-top:25px;" onclick="processLogin()">BOOT_OS</button>
        </div>
    </div>

    <div id="mainContent" style="display:none; width: 100%; flex-direction: column; align-items: center;">
        <div id="panelContainer" style="width: 90%; max-width: 500px;">
            
            <h1 class="rainbow-text" style="font-size: 1.6rem; text-align: center; margin: 30px 0;">SINGULARITY_OS v18</h1>

            <div class="glass-panel">
                <div class="drag-handle">ORBITAL_RADAR</div>
                <div id="map" style="height: 220px; width:100%; border-radius:12px;"></div>
            </div>

            <div class="glass-panel">
                <div class="drag-handle">BRUTE_FORCE_TERMINAL</div>
                <button class="btn" onclick="toggleHackerMode()">INITIALIZE OVERLOAD</button>
            </div>

            <div class="glass-panel">
                <div class="drag-handle">VISUAL_ENGINE</div>
                <canvas id="visualizer" style="width:100%; height:50px;"></canvas>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button class="btn" onclick="switchTheme('toxic')">TOXIC</button>
                    <button class="btn" onclick="switchTheme('amber')">AMBER</button>
                    <button class="btn" onclick="switchTheme('default')">NEON</button>
                </div>
            </div>

            <div class="glass-panel">
                <div class="drag-handle">CORE_AUDIO</div>
                <button class="btn" onclick="toggleAudio()">SYNC PULSE</button>
            </div>

        </div>

        <audio id="myAudio" loop crossorigin="anonymous"><source src="music.mp3" type="audio/mpeg"></audio>

        <div class="cli-box">
            <span style="color:var(--primary); margin-right:10px; font-weight:bold;">></span>
            <input type="text" id="cliInput" placeholder="SYSTEM_CMD...">
        </div>
        <p style="font-size: 0.6rem; color: #444; margin: 20px 0;">SINGULARITY KERNEL ACTIVE</p>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, t, d) {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0.05, audioCtx.currentTime);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
            o.stop(audioCtx.currentTime + d);
        }

        // --- KINETIC RIPPLE ---
        window.addEventListener('mousedown', (e) => {
            const rip = document.createElement('div');
            rip.className = 'ripple';
            rip.style.left = e.clientX + 'px';
            rip.style.top = e.clientY + 'px';
            rip.style.width = rip.style.height = '50px';
            rip.style.marginLeft = rip.style.marginTop = '-25px';
            document.body.appendChild(rip);
            setTimeout(() => rip.remove(), 600);
            playSfx(150, 'sine', 0.1);
        });

        function processLogin() {
            const p = document.getElementById('passInput').value.toUpperCase();
            if(p === "ADMIN" || p === "KHUSHAL") {
                playSfx(1200, 'square', 0.3);
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'flex';
                startSystem();
            }
        }

        function startSystem() {
            initParticles(); initDraggable(); initMap(); setupCLI();
            setInterval(updateISS, 3000);
        }

        function switchTheme(t) {
            playSfx(600, 'triangle', 0.1);
            document.body.className = t === 'default' ? '' : 'theme-' + t;
            initParticles();
        }

        let map, issMarker;
        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([26.9, 75.8], 2);
            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            issMarker = L.circleMarker([0,0], {color: 'var(--secondary)', radius: 12, fillOpacity: 1}).addTo(map);
        }

        async function updateISS() {
            try {
                const res = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
                const data = await res.json();
                issMarker.setLatLng([data.latitude, data.longitude]);
                map.panTo([data.latitude, data.longitude]);
            } catch(e) {}
        }

        // --- OVERLOAD HACKER MODE ---
        let isHackerMode = false, charIndex = 0;
        const kernelSource = `/* KERNEL_OVERLOAD_DETECTED */ void inject_shell(){ uint32_t addr = 0xDEADC0DE; while(1){ volatile int *p = (int*)addr; *p = 0x90909090; bypass_auth(USER_ROOT); stream_packets(LOCAL_IP); } }`.repeat(100);

        function toggleHackerMode() {
            isHackerMode = !isHackerMode;
            const el = document.getElementById('hackerMode');
            el.style.display = isHackerMode ? 'block' : 'none';
            if(isHackerMode) playSfx(50, 'sawtooth', 0.5);
        }

        function hack(amount) {
            if(!isHackerMode) return;
            const el = document.getElementById('hackerMode');
            el.innerHTML += kernelSource.slice(charIndex, charIndex + amount).replace(/\n/g, '<br>');
            charIndex += amount;
            el.scrollTop = el.scrollHeight;
            if(amount > 10) el.classList.add('overload');
            setTimeout(() => el.classList.remove('overload'), 200);
        }

        document.addEventListener('keydown', () => hack(5));
        document.addEventListener('touchstart', () => hack(15));

        function initParticles() {
            const clr = getComputedStyle(document.body).getPropertyValue('--primary').trim();
            particlesJS("particles-js", { "particles": { "number": { "value": 50 }, "color": { "value": clr }, "shape": {"type": "polygon", "polygon": {"nb_sides": 3}}, "line_linked": { "color": clr, "opacity": 0.3 }, "move": { "speed": 3, "out_mode": "bounce" } }, "interactivity": { "events": { "onhover": { "enable": true, "mode": "repulse" }, "onclick": { "enable": true, "mode": "push" } } } });
        }

        function initDraggable() { Sortable.create(document.getElementById('panelContainer'), { handle: '.drag-handle', animation: 300 }); }
        function setupCLI() { document.getElementById('cliInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') { playSfx(800, 'sine', 0.05); e.target.value = ''; } }); }

        let audioCtx2, analyser, source, dataArray, isAudioPlaying = false;
        function toggleAudio() {
            const a = document.getElementById("myAudio");
            if(!audioCtx2) {
                audioCtx2 = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx2.createAnalyser();
                source = audioCtx2.createMediaElementSource(a);
                source.connect(analyser); analyser.connect(audioCtx2.destination);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                renderViz();
            }
            if(isAudioPlaying) { a.pause(); isAudioPlaying = false; }
            else { a.play(); isAudioPlaying = true; }
        }
        function renderViz() {
            requestAnimationFrame(renderViz); if(!isAudioPlaying) return;
            const c = document.getElementById('visualizer'); const ctx = c.getContext('2d');
            analyser.getByteFrequencyData(dataArray); ctx.clearRect(0,0,c.width,c.height);
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--primary');
            for(let i=0; i<50; i++) { ctx.fillRect(i*10, 50 - (dataArray[i]/4), 4, dataArray[i]/4); }
        }
    </script>
</body>
</html>
