
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin OS | Kinetic Neon v20</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { 
            --primary: #00f3ff; --secondary: #ff00ea; --accent: #eaff00; 
            --glass: rgba(10, 10, 25, 0.8); 
        }
        
        body { 
            margin: 0; padding: 0; color: #fff; font-family: 'Segoe UI', sans-serif; 
            background: #050510; overflow-x: hidden; display: flex; 
            flex-direction: column; align-items: center; min-height: 100vh;
        }
        
        /* The Background Engine */
        #particles-js { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: -2; background: radial-gradient(circle, #1a0033 0%, #050510 100%);
        }

        .rainbow-text {
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent), var(--primary));
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 3s linear infinite;
            font-weight: 900;
        }
        @keyframes gradientMove { 0% {background-position: 0% 50%;} 100% {background-position: 100% 50%;} }

        /* Panels with Neon Glow */
        .glass-panel { 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border-radius: 20px; 
            padding: 20px; 
            margin-top: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2), inset 0 0 10px rgba(255, 0, 234, 0.1);
            transition: 0.3s;
        }

        .drag-handle { cursor: grab; padding-bottom: 10px; border-bottom: 1px solid var(--primary); margin-bottom: 15px; font-weight: bold; color: var(--primary); text-transform: uppercase; }

        .btn { 
            background: linear-gradient(45deg, var(--primary), var(--secondary)); 
            color: white; border: none; padding: 12px; cursor: pointer; border-radius: 10px; width: 100%; font-weight: bold; 
            box-shadow: 0 5px 15px rgba(255, 0, 234, 0.4);
        }

        /* Kinetic Ripple effect */
        .ripple {
            position: fixed; border-radius: 50%; background: rgba(255, 255, 255, 0.3);
            transform: scale(0); animation: ripple-anim 0.6s ease-out; pointer-events: none; z-index: 9999;
        }
        @keyframes ripple-anim { to { transform: scale(6); opacity: 0; } }

        .cli-box { 
            border: 2px solid var(--primary); padding: 12px; background: #000; 
            display: flex; align-items: center; border-radius: 12px; 
            width: 90%; max-width: 500px; margin-top: 25px;
        }
        #cliInput { background: transparent; border: none; color: #fff; flex-grow: 1; outline: none; font-family: monospace; }
        
        .leaflet-tile { filter: invert(100%) hue-rotate(180deg) brightness(130%); }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div id="loginScreen" style="position:fixed; width:100%; height:100%; background:#050510; z-index:10000; display:flex; justify-content:center; align-items:center;">
        <div class="glass-panel" style="width: 300px; text-align: center;">
            <h2 class="rainbow-text">KINETIC_LINK</h2>
            <input type="password" id="passInput" class="btn" style="background:rgba(255,255,255,0.05); border:1px solid var(--primary); text-align:center; margin-bottom:20px;" placeholder="USER PIN">
            <button class="btn" onclick="processLogin()">BOOT SYSTEM</button>
        </div>
    </div>

    <div id="mainContent" style="display:none; width: 100%; flex-direction: column; align-items: center;">
        <div id="panelContainer" style="width: 95%; max-width: 500px;">
            
            <h1 class="rainbow-text" style="font-size: 2rem; text-align: center; margin-top: 40px;">KINETIC_OS v20</h1>

            <div class="glass-panel">
                <div class="drag-handle">🛰️ ISS ORBITAL TRACKER</div>
                <div id="map" style="height: 200px; width:100%; border-radius:15px; border: 1px solid var(--primary);"></div>
            </div>

            <div class="glass-panel">
                <div class="drag-handle">💻 NEURAL TERMINAL</div>
                <button class="btn" onclick="confetti({particleCount:150, spread:70, origin:{y:0.6}})">TEST SYSTEM OVERLOAD</button>
            </div>

            <div class="glass-panel">
                <div class="drag-handle">📊 FREQUENCY PULSE</div>
                <canvas id="visualizer" style="width:100%; height:50px;"></canvas>
                <button class="btn" style="margin-top:10px;" onclick="toggleAudio()">SYNC AUDIO</button>
            </div>

        </div>

        <audio id="myAudio" loop crossorigin="anonymous"><source src="music.mp3" type="audio/mpeg"></audio>

        <div class="cli-box">
            <span style="color:var(--primary); margin-right:10px;">></span>
            <input type="text" id="cliInput" placeholder="READY_FOR_COMMAND...">
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, t, d) {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0.05, audioCtx.currentTime);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
            o.stop(audioCtx.currentTime + d);
        }

        // --- THE KINETIC TOUCH ---
        window.addEventListener('mousedown', (e) => {
            const rip = document.createElement('div');
            rip.className = 'ripple';
            rip.style.left = e.clientX + 'px';
            rip.style.top = e.clientY + 'px';
            rip.style.width = rip.style.height = '40px';
            rip.style.marginLeft = rip.style.marginTop = '-20px';
            document.body.appendChild(rip);
            setTimeout(() => rip.remove(), 600);
            playSfx(100, 'sine', 0.1);
        });

        function processLogin() {
            const p = document.getElementById('passInput').value.toUpperCase();
            if(p === "ADMIN" || p === "KHUSHAL") {
                playSfx(1000, 'square', 0.3);
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'flex';
                startSystem();
            }
        }

        function startSystem() {
            initParticles(); initDraggable(); initMap(); setupCLI();
            setInterval(updateISS, 3000);
        }

        let map, issMarker;
        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([26.9, 75.8], 2);
            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            issMarker = L.circleMarker([0,0], {color: 'var(--secondary)', radius: 10, fillOpacity: 1}).addTo(map);
        }

        async function updateISS() {
            try {
                const res = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
                const data = await res.json();
                issMarker.setLatLng([data.latitude, data.longitude]);
                map.panTo([data.latitude, data.longitude]);
            } catch(e) {}
        }

        function initParticles() {
            particlesJS("particles-js", {
                "particles": {
                    "number": { "value": 80 },
                    "color": { "value": ["#00f3ff", "#ff00ea", "#eaff00"] },
                    "shape": { "type": "circle" },
                    "opacity": { "value": 0.6 },
                    "size": { "value": 3 },
                    "line_linked": { "enable": true, "distance": 150, "color": "#00f3ff", "opacity": 0.4, "width": 1 },
                    "move": { "enable": true, "speed": 4, "direction": "none", "out_mode": "bounce" }
                },
                "interactivity": {
                    "events": {
                        "onhover": { "enable": true, "mode": "grab" }, // Particles follow your finger!
                        "onclick": { "enable": true, "mode": "push" }
                    },
                    "modes": {
                        "grab": { "distance": 200, "line_linked": { "opacity": 1 } }
                    }
                }
            });
        }

        function initDraggable() { Sortable.create(document.getElementById('panelContainer'), { handle: '.drag-handle', animation: 300 }); }
        function setupCLI() { document.getElementById('cliInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') { playSfx(800, 'sine', 0.05); e.target.value = ''; } }); }

        let audioCtx2, analyser, source, dataArray, isAudioPlaying = false;
        function toggleAudio() {
            const a = document.getElementById("myAudio");
            if(!audioCtx2) {
                audioCtx2 = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx2.createAnalyser();
                source = audioCtx2.createMediaElementSource(a);
                source.connect(analyser); analyser.connect(audioCtx2.destination);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                renderViz();
            }
            if(isAudioPlaying) { a.pause(); isAudioPlaying = false; }
            else { a.play(); isAudioPlaying = true; }
        }
        function renderViz() {
            requestAnimationFrame(renderViz); if(!isAudioPlaying) return;
            const c = document.getElementById('visualizer'); const ctx = c.getContext('2d');
            analyser.getByteFrequencyData(dataArray); ctx.clearRect(0,0,c.width,c.height);
            ctx.fillStyle = "#00f3ff";
            for(let i=0; i<40; i++) { ctx.fillRect(i*10, 50 - (dataArray[i]/6), 6, dataArray[i]/6); }
        }
    </script>
</body>
</html>
