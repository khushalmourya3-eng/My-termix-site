<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Mission NEET 2026 | Control Room</title>
                <style>
                        body { 
                                    margin: 0; 
                                                padding: 0; 
                                                            color: #00ff41; 
                                                                        font-family: 'Courier New', monospace; 
                                                                                    display: flex; 
                                                                                                flex-direction: column; 
                                                                                                            align-items: center; 
                                                                                                                        min-height: 100vh;
                                                                                                                                    overflow-x: hidden;
                                                                                                                                            }

                                                                                                                                                    /* Matrix Canvas Background */
                                                                                                                                                            canvas {
                                                                                                                                                            	            display: block;
                                                                                                                                                            	                        position: fixed;
                                                                                                                                                            	                                    top: 0;
                                                                                                                                                            	                                                left: 0;
                                                                                                                                                            	                                                            width: 100vw;
                                                                                                                                                            	                                                                        height: 100vh;
                                                                                                                                                            	                                                                                    z-index: -1;
                                                                                                                                                            	                                                                                            }

                                                                                                                                                            	                                                                                                    /* Control Panel Container */
                                                                                                                                                            	                                                                                                            .container { 
                                                                                                                                                            	                                                                                                                        border: 2px solid #00ff41; 
                                                                                                                                                            	                                                                                                                                    padding: 25px; 
                                                                                                                                                            	                                                                                                                                                border-radius: 15px; 
                                                                                                                                                            	                                                                                                                                                            box-shadow: 0 0 30px rgba(0, 255, 65, 0.4); 
                                                                                                                                                            	                                                                                                                                                                        background: rgba(0, 0, 0, 0.85); /* Dark transparent background */
                                                                                                                                                            	                                                                                                                                                                                    max-width: 500px; 
                                                                                                                                                            	                                                                                                                                                                                                width: 90%; 
                                                                                                                                                            	                                                                                                                                                                                                            text-align: center;
                                                                                                                                                            	                                                                                                                                                                                                                        margin-top: 5vh;
                                                                                                                                                            	                                                                                                                                                                                                                                    z-index: 1;
                                                                                                                                                            	                                                                                                                                                                                                                                                backdrop-filter: blur(5px);
                                                                                                                                                            	                                                                                                                                                                                                                                                        }

                                                                                                                                                            	                                                                                                                                                                                                                                                                .glow-text { 
                                                                                                                                                            	                                                                                                                                                                                                                                                                            text-shadow: 0 0 10px #00ff41, 0 0 20px #00ff41; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                        animation: pulse 2s infinite alternate; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                }

                                                                                                                                                            	                                                                                                                                                                                                                                                                                                        @keyframes pulse { 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                    from { opacity: 0.8; } 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                to { opacity: 1; text-shadow: 0 0 20px #00ff41, 0 0 40px #00ff41; } 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                img { 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                            width: 100%; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                        border-radius: 10px; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                    border: 1px solid #00ff41; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                margin: 20px 0; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                            box-shadow: 0 0 15px rgba(0, 255, 65, 0.5); 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                            #timer { 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                        font-size: 1.2rem; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                    color: #ff3e3e; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                border: 1px solid #ff3e3e; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                            padding: 10px; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        margin-top: 15px; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    display: inline-block; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                background: rgba(0,0,0,0.7);
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .music-btn { 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    background: rgba(0,0,0,0.8); 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                color: #00ff41; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            border: 2px solid #00ff41; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        padding: 12px 25px; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    margin-top: 20px; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                cursor: pointer; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            font-family: inherit; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        font-weight: bold; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    text-transform: uppercase; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                transition: 0.3s; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            border-radius: 5px; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        box-shadow: 0 0 10px #00ff41; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                .music-btn:hover { 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            background: #00ff41; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        color: black; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    box-shadow: 0 0 25px #00ff41; 
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </style>
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </head>
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <body>

                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <canvas id="matrix"></canvas>

                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="container">
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <h1 class="glow-text">HELLO FUTURE DOCTORS</h1>
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <p>>_ Status: Preparing for Surgery (NEET)</p>

                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <img src="https://images.unsplash.com/photo-1622253692010-333f2da6031d?w=500" alt="Future Doctor">

                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <h3 style="color: white;">MISSION: NEET 2026</h3>
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div id="timer">Initializing...</div>

                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <audio id="myAudio" loop>
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <source src="music.mp3" type="audio/mpeg">
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </audio>
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <br>
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <button class="music-btn" onclick="toggleMusic()" id="btnText">🎧 Start Mission Music</button>
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <script>
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // --- MATRIX RAIN EFFECT LOGIC ---
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const canvas = document.getElementById('matrix');
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const ctx = canvas.getContext('2d');

                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    canvas.width = window.innerWidth;
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            canvas.height = window.innerHeight;

                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*';
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const fontSize = 14;
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const columns = canvas.width / fontSize;
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const drops = [];

                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    for(let x = 0; x < columns; x++) { drops[x] = 1; }

                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    function drawMatrix() {
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    	            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    	                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    	                                    ctx.fillStyle = '#0F0';
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    	                                                ctx.font = fontSize + 'px monospace';

                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    	                                                                        for(let i = 0; i < drops.length; i++) {
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    	                                                                        	                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    	                                                                        	                                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    	                                                                        	                                                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    	                                                                        	                                                                drops[i]++;
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    	                                                                        	                                                                            }
                                                                                                                                                            	                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    	                                                                        	                                                                                    }
