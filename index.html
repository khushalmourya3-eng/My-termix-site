
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin OS | Level 15 Sentinel</title>
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"System Admin","short_name":"Admin OS","start_url":".","display":"standalone","background_color":"#050510","theme_color":"#00f3ff","icons":[{"src":"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png","sizes":"512x512","type":"image/png"}]}'>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        html { scroll-behavior: smooth; }
        :root { 
            --primary: #00f3ff; --secondary: #ff00ea; --accent: #eaff00; 
            --glass-bg: rgba(10, 10, 20, 0.7); --glass-border: rgba(255, 255, 255, 0.1); 
        }

        /* THEME PRESETS */
        body.theme-toxic { --primary: #00ff41; --secondary: #003b00; --accent: #adff2f; }
        body.theme-amber { --primary: #ffb100; --secondary: #5a2a00; --accent: #ff4500; }

        body { margin: 0; padding: 0; color: #fff; font-family: 'Segoe UI', sans-serif; background: #050510; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; transition: all 0.5s ease; }
        
        #particles-js { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; background: #050510; }

        .rainbow-text { background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent), var(--primary)); background-size: 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradientMove 5s ease infinite; font-weight: bold; }
        @keyframes gradientMove { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }

        #loginScreen, #bootScreen, #lockScreen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #050510; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        #lockScreen { z-index: 10000; background: rgba(5, 5, 16, 0.9); }
        
        .login-box { border: 1px solid var(--primary); padding: 40px; text-align: center; border-radius: 20px; background: var(--glass-bg); width: 85%; max-width: 400px; }
        .login-input { background: rgba(0,0,0,0.5); color: var(--primary); border: 1px solid var(--primary); padding: 12px; margin: 20px 0; outline: none; text-align: center; width: 80%; border-radius: 8px; font-size: 1.2rem; }

        #mainContent { width: 100%; flex-direction: column; align-items: center; position: relative; }
        .hidden { display: none !important; }

        #hud { width: 95%; max-width: 600px; background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 0 0 15px 15px; padding: 15px 0; text-align: center; position: sticky; top: 0; z-index: 50; display: flex; justify-content: space-around; font-size: 0.8rem; font-weight: bold; }
        #hud i { color: var(--primary); font-style: normal; margin-right: 4px; }

        .container { max-width: 600px; width: 90%; text-align: center; margin-bottom: 5vh; z-index: 1; }
        .btn { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; text-transform: uppercase; border-radius: 8px; width: 100%; margin-top: 10px; }

        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 15px; padding: 20px; margin-top: 25px; text-align: left; transition: 0.3s; }
        .drag-handle { cursor: grab; text-align: center; margin-top: 0; color: #fff; font-size: 1.1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Performance Monitor Styling */
        .perf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .perf-item { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px; text-align: center; }
        .perf-val { font-size: 1.2rem; font-family: monospace; color: var(--accent); }

        .t-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; font-family: monospace; }
        .t-bar-bg { width: 100%; background: rgba(0,0,0,0.5); height: 12px; border-radius: 6px; margin-bottom: 15px; overflow: hidden; }
        .t-bar-fill { height: 100%; transition: width 0.3s ease-out; background: var(--primary); }

        #visualizer { width: 100%; height: 70px; background: rgba(0,0,0,0.4); border-radius: 8px; border: 1px solid var(--glass-border); }
        #chatLog { height: 140px; overflow-y: auto; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; border: 1px solid var(--glass-border); font-family: monospace; font-size: 0.8rem; }
        
        #cliInput, #chatInput { background: rgba(0,0,0,0.4); color: white; border: 1px solid var(--glass-border); padding: 12px; border-radius: 8px; outline: none; flex-grow: 1; font-family: monospace; }
        .cli-box { border: 1px solid var(--primary); padding: 15px; background: rgba(0,0,0,0.7); border-radius: 10px; display: flex; align-items: center; }

        /* Map & Cam */
        .leaflet-tile { filter: invert(100%) hue-rotate(180deg) brightness(130%); }
        .sec-cam-container { position: relative; border: 1px solid var(--primary); border-radius: 8px; overflow: hidden; background: #000; min-height: 180px; }
        #secCam { width: 100%; filter: sepia(100%) hue-rotate(130deg) saturate(300%); display: none; }
    </style>
</head>
<body id="osBody">

    <div id="particles-js"></div>

    <div id="loginScreen">
        <div class="login-box">
            <h2 class="rainbow-text" style="font-size: 2rem;">Sentinel Access</h2>
            <input type="password" id="passInput" class="login-input" placeholder="Enter PIN">
            <button class="btn" onclick="processLogin()">Authorize</button>
        </div>
    </div>

    <div id="lockScreen" class="hidden">
        <div class="login-box" style="border-color: var(--secondary);">
            <h2 style="color: var(--secondary); font-family: monospace;">SECURED</h2>
            <button class="btn" id="bioBtn" onclick="biometricUnlock()" style="margin-bottom: 10px;">☝️ BIOMETRIC UNLOCK</button>
            <input type="password" id="unlockInput" class="login-input" placeholder="Manual Override">
            <button class="btn" onclick="unlockSystem()">Manual Unlock</button>
        </div>
    </div>

    <div id="bootScreen" class="hidden"><div id="bootLogs" style="font-family: monospace; font-size: 0.8rem;"></div></div>

    <div id="mainContent" class="hidden">
        <div id="hud">
            <span><i>🔋</i><span id="batData">--%</span></span> 
            <span><i>📡</i><span id="netData">--</span></span> 
            <span><i>🌦️</i><span id="weatherData">...</span></span>
            <span><i>⏱️</i><span id="clockData">00:00</span></span>
        </div>

        <div class="container">
            <h1 class="rainbow-text" style="font-size: 2.2rem; margin-bottom: 5px;">ADMIN OS v15</h1>
            
            <div id="panelContainer">
                
                <div class="glass-panel" data-id="p-kernel">
                    <h3 class="drag-handle">📟 KERNEL PERFORMANCE</h3>
                    <div class="perf-grid">
                        <div class="perf-item"><div>REFRESH</div><div id="perf-fps" class="perf-val">0 FPS</div></div>
                        <div class="perf-item"><div>MEM USAGE</div><div id="perf-mem" class="perf-val">-- MB</div></div>
                    </div>
                </div>

                <div class="glass-panel" data-id="p-theme">
                    <h3 class="drag-handle">🎨 NEURAL THEMES</h3>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <button class="btn" onclick="switchTheme('default')" style="background: linear-gradient(45deg, #00f3ff, #ff00ea);">CYBER</button>
                        <button class="btn" onclick="switchTheme('toxic')" style="background: #00ff41; color: black;">TOXIC</button>
                        <button class="btn" onclick="switchTheme('amber')" style="background: #ffb100; color: black;">AMBER</button>
                    </div>
                </div>

                <div class="glass-panel" data-id="p-crypto">
                    <h3 class="drag-handle">📈 LIVE CRYPTO</h3>
                    <div class="t-row"><span>BTC/USDT</span><span id="btcPrice" style="color:var(--primary)">Connecting...</span></div>
                    <div class="t-row"><span>ETH/USDT</span><span id="ethPrice" style="color:var(--accent)">Connecting...</span></div>
                </div>

                <div class="glass-panel" data-id="p-chat">
                    <h3 class="drag-handle">🧠 A.I. COMM-LINK</h3>
                    <div id="chatLog"></div>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <input type="text" id="chatInput" placeholder="Query A.I...">
                        <button id="chatBtn" onclick="sendChat()" style="width: 70px;" class="btn">SEND</button>
                    </div>
                </div>

                <div class="glass-panel" data-id="p-radar">
                    <h3 class="drag-handle">🌍 SAT-RADAR</h3>
                    <div id="map" style="height: 180px; width: 100%; border-radius: 8px;"></div>
                </div>

                <div class="glass-panel" data-id="p-vfs">
                    <h3 class="drag-handle">🗂️ VIRTUAL DIR</h3>
                    <div id="vfsContainer"></div>
                </div>

                <div class="glass-panel" data-id="p-traffic">
                    <h3 class="drag-handle">📊 TRAFFIC</h3>
                    <div style="height: 120px;"><canvas id="trafficChart"></canvas></div>
                </div>

                <div class="glass-panel" data-id="p-audio">
                    <h3 class="drag-handle">🎵 AUDIO</h3>
                    <canvas id="visualizer"></canvas>
                    <button id="audioBtn" class="btn" onclick="toggleAudio()">▶ PLAY</button>
                </div>
            </div>

            <audio id="myAudio" loop crossorigin="anonymous"><source src="music.mp3" type="audio/mpeg"></audio>

            <div style="margin-top: 30px; width: 100%;">
                <div class="cli-box">
                    <span style="color:var(--primary); font-family:monospace; margin-right: 10px;">#root></span>
                    <input type="text" id="cliInput" placeholder="System command..." autocomplete="off">
                    <button onclick="startVoice()" style="background:transparent; border:none; cursor:pointer;">🎙️</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. PERFORMANCE MONITOR ---
        let fpsCount = 0; let lastTime = performance.now();
        function updatePerf() {
            fpsCount++;
            let now = performance.now();
            if (now >= lastTime + 1000) {
                document.getElementById('perf-fps').innerText = fpsCount + " FPS";
                fpsCount = 0; lastTime = now;
                if(window.performance && window.performance.memory) {
                    let mem = Math.round(window.performance.memory.usedJSHeapSize / 1048576);
                    document.getElementById('perf-mem').innerText = mem + " MB";
                }
            }
            requestAnimationFrame(updatePerf);
        }

        // --- 2. BIOMETRIC SENTINEL ---
        async function biometricUnlock() {
            const btn = document.getElementById('bioBtn');
            if (window.PublicKeyCredential) {
                btn.innerText = "AUTHENTICATING...";
                // Note: Real WebAuthn requires a challenge from a server. 
                // This simulates the prompt call for the UI/UX experience.
                setTimeout(() => { unlockSystem(true); }, 1500);
            } else {
                alert("Biometrics not supported on this browser.");
            }
        }

        // --- 3. DYNAMIC THEME ENGINE ---
        function switchTheme(t) {
            const body = document.getElementById('osBody');
            body.className = t === 'default' ? '' : 'theme-' + t;
            localStorage.setItem('adminTheme', t);
            // Refresh particles & chart colors
            initParticles();
            initChart();
        }

        // --- CORE LOGIC ---
        function runBootSequence() {
            document.getElementById("loginScreen").style.display = "none";
            const bootScreen = document.getElementById("bootScreen"); bootScreen.classList.remove("hidden");
            const logs = ["Kernel initialized.", "Loading Biometric drivers...", "Mapping Jaipur coordinates...", "Sentinel Active."];
            let delay = 0;
            logs.forEach(msg => {
                setTimeout(() => { document.getElementById("bootLogs").innerHTML += `<div>[OK] ${msg}</div>`; }, delay);
                delay += 300;
            });
            setTimeout(() => { bootScreen.classList.add("hidden"); document.getElementById("mainContent").classList.remove("hidden"); startSystem(); }, delay + 500);
        }

        function startSystem() { 
            initParticles(); initChart(); initCrypto(); initDraggable(); updatePerf();
            setTimeout(initMap, 500); startHUD(); setupCLI(); initVFS();
            const savedTheme = localStorage.getItem('adminTheme');
            if(savedTheme) switchTheme(savedTheme);
        }

        // Re-use logic from L14
        function initCrypto() {
            const btcWs = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
            btcWs.onmessage = (e) => { document.getElementById('btcPrice').innerText = '$' + parseFloat(JSON.parse(e.data).p).toFixed(2); };
            const ethWs = new WebSocket('wss://stream.binance.com:9443/ws/ethusdt@trade');
            ethWs.onmessage = (e) => { document.getElementById('ethPrice').innerText = '$' + parseFloat(JSON.parse(e.data).p).toFixed(2); };
        }

        function initParticles() {
            const pColor = getComputedStyle(document.body).getPropertyValue('--primary').trim();
            particlesJS("particles-js", { "particles": { "number": { "value": 50 }, "color": { "value": pColor }, "line_linked": { "color": pColor, "opacity": 0.3 }, "move": { "speed": 2 } }, "interactivity": { "events": { "onhover": { "enable": true, "mode": "grab" } } } });
        }

        let trafficChart;
        function initChart() {
            const ctx = document.getElementById('trafficChart').getContext('2d');
            const pColor = getComputedStyle(document.body).getPropertyValue('--primary').trim();
            if(trafficChart) trafficChart.destroy();
            trafficChart = new Chart(ctx, { type: 'line', data: { labels: Array(20).fill(''), datasets: [{ data: Array(20).fill(0), borderColor: pColor, borderWidth: 2, fill: true, backgroundColor: 'rgba(0,255,0,0.1)', pointRadius: 0 }] }, options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { x: { display: false }, y: { display: false } }, plugins: { legend: false } } });
            setInterval(() => { let d = trafficChart.data.datasets[0].data; d.push(Math.floor(Math.random() * 100)); d.shift(); trafficChart.update(); }, 800);
        }

        function initDraggable() { Sortable.create(document.getElementById('panelContainer'), { handle: '.drag-handle', animation: 250, store: { get: (s) => localStorage.getItem('adminLayout')?.split('|') || [], set: (s) => localStorage.setItem('adminLayout', s.toArray().join('|')) } }); }
        
        function processLogin() { const p = document.getElementById("passInput").value.toUpperCase(); if(p === "ADMIN" || p === "KHUSHAL") { localStorage.setItem("hasAccess", "true"); runBootSequence(); } }
        function unlockSystem(auto=false) { 
            const p = document.getElementById("unlockInput").value.toUpperCase(); 
            if(auto || p === "ADMIN" || p === "KHUSHAL") { document.getElementById("lockScreen").classList.add("hidden"); idleTime = 0; isLocked = false; } 
        }

        let idleTime = 0; let isLocked = false;
        function checkIdle() { idleTime++; if(idleTime >= 60 && !isLocked && !document.getElementById("mainContent").classList.contains("hidden")) { isLocked = true; document.getElementById("lockScreen").classList.remove("hidden"); } }
        setInterval(checkIdle, 1000); document.onmousemove = document.onkeypress = document.ontouchstart = () => { if(!isLocked) idleTime = 0; };

        function sendChat() {
            const i = document.getElementById('chatInput'); const l = document.getElementById('chatLog'); const m = i.value.trim(); if(!m) return;
            l.innerHTML += `<div><span style="color:var(--accent)">You:</span> ${m}</div>`; i.value = '';
            setTimeout(() => { let r = m.toLowerCase().includes("admin") ? "Welcome Khushal. Memory optimized. WebSocket health at 100%." : "Data processed by Sentinel kernel."; l.innerHTML += `<div style="color:var(--primary)">>_ AI: ${r}</div>`; l.scrollTop = l.scrollHeight; }, 600);
        }

        function initMap() { var map = L.map('map', { zoomControl: false }).setView([26.9124, 75.7873], 12); L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); L.marker([26.9124, 75.7873]).addTo(map); }
        function startHUD() { setInterval(() => { document.getElementById('clockData').innerText = new Date().toLocaleTimeString('en-IN', { hour12: false }); }, 1000); }
        function setupCLI() { document.getElementById('cliInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') { let c = e.target.value.toLowerCase(); if(c === '/play') toggleAudio(); else if(c === '/clear') localStorage.clear(); e.target.value = ''; } }); }
        function initVFS() { document.getElementById('vfsContainer').innerHTML = "<div style='font-family:monospace; color:var(--primary); font-size:0.8rem;'>📁 logs<br>📄 sentinel_v15.sys</div>"; }

        let isAudioPlaying = false; let audioCtx, analyser, source, dataArray;
        function toggleAudio() {
            const a = document.getElementById("myAudio"); if(!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); analyser = audioCtx.createAnalyser(); source = audioCtx.createMediaElementSource(a); source.connect(analyser); analyser.connect(audioCtx.destination); dataArray = new Uint8Array(analyser.frequencyBinCount); draw(); }
            if(isAudioPlaying) { a.pause(); isAudioPlaying = false; } else { a.play(); isAudioPlaying = true; }
        }
        function draw() { requestAnimationFrame(draw); if(!isAudioPlaying) return; const c = document.getElementById('visualizer'); const ctx = c.getContext('2d'); analyser.getByteFrequencyData(dataArray); ctx.clearRect(0,0,c.width,c.height); ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--primary'); dataArray.forEach((v, i) => { ctx.fillRect(i*3, 70-(v/4), 2, v/4); }); }
    </script>
</body>
</html>
